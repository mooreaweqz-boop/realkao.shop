<!-- แทนที่ตรงส่วนกล่องผู้ใช้งานเดิมด้วย ID สำหรับให้ JavaScript สั่งเปลี่ยนตัวเลข -->
<div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm relative overflow-hidden">
    <div class="relative z-10">
        <p class="text-sm text-gray-600">ผู้ใช้งานออนไลน์ขณะนี้</p>
        <!-- เพิ่ม id="active-users" เพื่อให้ดึงค่ามาใส่ตรงนี้ -->
        <p class="text-3xl font-semibold text-purple-600 mt-1">
            <span id="active-users">0</span> 
            <span class="text-sm text-gray-500 font-normal">คน</span>
        </p>
    </div>
    <div class="absolute -right-4 -bottom-4 w-20 h-20 border-4 border-purple-50 rounded-full"></div>
</div>

<!-- โค้ด JavaScript สำหรับเชื่อมต่อฐานข้อมูล (วางไว้ก่อนปิด </body>) -->
<script type="module">
  // 1. นำเข้า Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // 2. ตั้งค่า Firebase Config (ต้องไปสมัครและสร้างโปรเจกต์ที่ firebase.google.com)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // 3. เริ่มต้นทำงาน
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // สร้าง ID สุ่มสำหรับผู้ใช้งานแต่ละคนที่เข้ามาเปิดเว็บ
  const userId = "user_" + Math.random().toString(36).substr(2, 9);
  const myPresenceRef = ref(db, 'online_users/' + userId);
  const countRef = ref(db, 'online_users');

  // เมื่อผู้ใช้เข้ามา ให้บันทึกสถานะว่าออนไลน์ (เก็บเวลา หรือข้อมูลเบื้องต้นได้)
  set(myPresenceRef, { online: true, last_active: Date.now() });

  // เมื่อผู้ใช้ปิดหน้าเว็บ หรือเน็ตหลุด ให้ลบข้อมูลคนนี้ออกจากฐานข้อมูลโดยอัตโนมัติ
  onDisconnect(myPresenceRef).remove();

  // 4. คอยฟังคำสั่งดึงยอดรวมคนออนไลน์ทั้งหมดมาแสดงบนหน้าเว็บแบบเรียลไทม์
  onValue(countRef, (snapshot) => {
    const users = snapshot.val();
    const totalOnline = users ? Object.keys(users).length : 0;
    
    // เปลี่ยนตัวเลขบนหน้าจอ HTML ตามจำนวนจริง
    document.getElementById('active-users').innerText = totalOnline;
  });
</script>
